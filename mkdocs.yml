site_name: Fireworks Mania Mod Tools
site_url: https://laumania.github.io/FireworksMania.ModTools/
site_description: Documentation for creating mods for Fireworks Mania using the Fireworks Mania Mod Tools for Unity.
site_author: Laumania ApS
repo_url: https://github.com/Laumania/FireworksMania.ModTools
repo_name: Laumania/FireworksMania.ModTools
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Best Practices: best-practices.md
  - Optimization: optimization.md
  - Script Reference:
    - Overview: script-reference/index.md
    - Definitions: script-reference/definitions.md
    - Behaviors: script-reference/behaviors.md
    - Firework Parts: script-reference/firework-parts.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
